# FinApply.ai — CI Pipeline
# Runs on every push and PR to catch build-breaking changes
# BEFORE they reach Vercel and break production.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Dummy values so Next.js build doesn't crash on missing env vars.
  # These are NOT real credentials — they exist only to satisfy
  # the build-time checks. Runtime uses Vercel env vars.
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
  GEMINI_API_KEY: placeholder-gemini-key
  RESEND_API_KEY: re_placeholder
  NEXT_PUBLIC_APP_URL: https://finapply.ai
  MAKE_WEBHOOK_SECRET: placeholder-webhook-secret
  ADMIN_EMAIL: ci-placeholder@example.com
  ADMIN_API_SECRET: placeholder-internal-secret

jobs:
  # ──────────────────────────────────────────────
  # 1. Type Check — catches TypeScript errors
  # ──────────────────────────────────────────────
  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type Check
        run: npm run type-check

  # ──────────────────────────────────────────────
  # 2. Lint — catches code quality issues
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

  # ──────────────────────────────────────────────
  # 3. Build — the ultimate gate. If this fails,
  #    Vercel deploy WOULD fail too.
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "=== Build Output Summary ==="
          echo "Build completed successfully."
          # Log the .next directory size for monitoring
          du -sh .next/ 2>/dev/null || echo "Build artifacts not found"
